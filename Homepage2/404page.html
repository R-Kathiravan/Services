<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly Partners</title>
    <!-- <link rel="stylesheet" href="shared.css"> -->
    <link rel="stylesheet" href="404page.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="driver-theme">
    <main class="error-main">
        <section class="error-hero">
            <div class="error-content">

                <div class="error-visual">
                    <div class="error-number">
                        <span class="digit digit-4">4</span>

                        <div class="zero-container">
                            <span class="digit digit-0">0</span> 
                        </div>
                        <span class="digit digit-4">4</span>
                    </div>

                    <h1 class="error-title">
                        Oops! This page took a wrong turn
                    </h1>

                    <p class="error-desc">
                        Looks like this route doesn't exist. The destination you're looking for might have
                        moved or the address might be incorrect. Let's get you back on track.
                    </p>
                </div>


                <div class="error-actions">
                    <a href="index.html" class="btn-home">
                        <i class="fas fa-home"></i>
                        Go Home
                    </a>

                    <a href="support.html" class="btn-support">
                        <i class="fas fa-headset"></i>
                        Get Help
                    </a>
                </div>


                <div class="popular-links">
                    <h3>Popular Destinations</h3>

                    <div class="link-grid">

                        <a href="login.html" class="link-card">
                            <div class="link-icon">
                                <i class="fas fa-sign-in-alt"></i>
                            </div>
                            <span>Login</span>
                        </a>

                        <a href="requirments.html" class="link-card">
                            <div class="link-icon">
                                <i class="fas fa-car"></i>
                            </div>
                            <span>Become a Driver</span>
                        </a>

                        <a href="earnings.html" class="link-card">
                            <div class="link-icon">
                                <i class="fas fa-wallet"></i>
                            </div>
                            <span>Earnings</span>
                        </a>

                        <a href="support.html" class="link-card">
                            <div class="link-icon">
                                <i class="fas fa-question-circle"></i>
                            </div>
                            <span>Support</span>
                        </a>

                    </div>
                </div>

            </div>

            </div>

        </section>
    </main> 
</body>

</html>
